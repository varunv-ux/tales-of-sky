<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F0EB"/>
      <stop offset="100%" stop-color="#E8E0D8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Cloud shapes -->
  <g opacity="0.15">
    <circle cx="200" cy="150" r="80" fill="#C4B5A5"/>
    <circle cx="280" cy="140" r="100" fill="#C4B5A5"/>
    <circle cx="350" cy="160" r="70" fill="#C4B5A5"/>
    <circle cx="900" cy="400" r="90" fill="#C4B5A5"/>
    <circle cx="980" cy="390" r="110" fill="#C4B5A5"/>
    <circle cx="1060" cy="410" r="75" fill="#C4B5A5"/>
  </g>
  <!-- Sun -->
  <circle cx="950" cy="130" r="60" fill="#F0D5A0" opacity="0.3"/>
  <circle cx="950" cy="130" r="40" fill="#F0D5A0" opacity="0.4"/>
  <!-- Title -->
  <text x="600" y="240" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="82" font-weight="900" fill="#3B2B20" letter-spacing="-3">Tales of Sky</text>
  <!-- Tagline -->
  <text x="600" y="310" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="32" fill="#8B7B6B" font-style="italic">Weather, beautifully told</text>
  <!-- Divider -->
  <line x1="480" y1="340" x2="720" y2="340" stroke="#C4B5A5" stroke-width="1.5"/>
  <!-- Features -->
  <text x="600" y="400" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="22" fill="#6B5B4B">Ghibli-style art · Witty weather lines · City landmarks</text>
  <!-- Weather emoji row -->
  <text x="600" y="470" text-anchor="middle" font-size="40">☀️ 🌧️ ⛈️ ❄️ 🌫️ 🌙</text>
  <!-- URL -->
  <text x="600" y="560" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="20" fill="#A09080" letter-spacing="2">talesofsky.com</text>
</svg>
